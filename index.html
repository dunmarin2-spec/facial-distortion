<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>형님의 마법 AI 사진관</title>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #333; }
        .camera-box { position: relative; width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #000; }
        video, img { width: 100%; display: block; }
        img { display: none; } 
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; }
        select, button { padding: 15px; font-size: 16px; border-radius: 10px; border: none; font-weight: bold; }
        select { background-color: #fff; border: 2px solid #ddd; outline: none; }
        button { background-color: #4CAF50; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background-color: #45a049; transform: translateY(-2px); }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        #loading { display: none; text-align: center; color: #d32f2f; font-weight: bold; margin-top: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <h1>✨ 형님의 마법 AI 사진관 ✨</h1>

    <div class="camera-box">
        <video id="camera" autoplay playsinline></video>
        <img id="resultImage" alt="변환된 결과물">
    </div>

    <div class="controls">
        <select id="styleSelect">
            <option value="ghibli">🍃 스튜디오 지브리 스타일</option>
            <option value="webtoon">💬 네이버 K-웹툰 스타일</option>
            <option value="disney">🏰 디즈니 픽사 3D 스타일</option>
        </select>
        
        <button id="captureBtn">📸 찰칵! AI 변환 시작하기</button>
        <button id="retryBtn" style="display:none; background-color:#ff5722;">🔄 다시 찍기</button>
    </div>
    
    <div id="loading">🚀 대기 중...</div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('camera');
        const resultImage = document.getElementById('resultImage');
        const captureBtn = document.getElementById('captureBtn');
        const retryBtn = document.getElementById('retryBtn');
        const styleSelect = document.getElementById('styleSelect');
        const loading = document.getElementById('loading');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("카메라 권한을 허용해주세요!"));

        captureBtn.addEventListener('click', async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const imageDataUrl = canvas.toDataURL('image/jpeg');
            const selectedStyle = styleSelect.value;

            video.style.display = 'none';
            resultImage.style.display = 'none';
            loading.style.display = 'block';
            loading.innerText = "🚀 AI에게 작업 지시 중...";
            captureBtn.disabled = true;

            try {
                // 1. 서버에 사진을 보내서 그림 주문을 넣습니다.
                const startResponse = await fetch('/api/transform', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageDataUrl, style: selectedStyle })
                });
                
                let prediction = await startResponse.json();

                // 🚨 [수정된 핵심 방어막 1] 첫 주문에서 에러가 났다면 무한루프 안 돌고 여기서 즉시 컷!
                if (!startResponse.ok || prediction.error) {
                    let errorMsg = prediction.detail ? JSON.stringify(prediction.detail) : (prediction.error || "알 수 없는 에러");
                    throw new Error("AI 주문 거절됨: " + errorMsg);
                }

                // 2. 형님의 폰(브라우저)이 3초마다 직접 상태를 확인합니다.
                while (prediction.status !== "succeeded" && prediction.status !== "failed") {
                    await new Promise(r => setTimeout(r, 3000)); // 3초 여유
                    
                    loading.innerText = `⏳ AI가 그림을 그리는 중입니다... (상태: ${prediction.status})`;
                    
                    const pollResponse = await fetch('/api/transform', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ predictionId: prediction.id }) 
                    });
                    
                    prediction = await pollResponse.json();

                    // 🚨 [수정된 핵심 방어막 2] 확인 중 에러가 나도 바로 멈춤!
                    if (!pollResponse.ok) {
                        let errorMsg = prediction.detail ? JSON.stringify(prediction.detail) : (prediction.error || "알 수 없는 에러");
                        throw new Error("상태 확인 중 오류: " + errorMsg);
                    }
                }

                if (prediction.status === "succeeded") {
                    resultImage.src = prediction.output[0];
                    resultImage.style.display = 'block';
                    retryBtn.style.display = 'block';
                    captureBtn.style.display = 'none';
                } else {
                    throw new Error("AI가 그림을 망쳤습니다. 다시 시도해주세요. 상태: " + prediction.status);
                }

            } catch (error) {
                // 🚨 여기서 "진짜" 원인이 화면에 팝업으로 뜹니다.
                alert("서버 통신 실패!\n원인: " + error.message);
                video.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                captureBtn.disabled = false;
            }
        });

        retryBtn.addEventListener('click', () => {
            resultImage.style.display = 'none';
            video.style.display = 'block';
            retryBtn.style.display = 'none';
            captureBtn.style.display = 'block';
        });
    </script>
</body>
</html>
