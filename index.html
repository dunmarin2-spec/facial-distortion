<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>형님의 얼굴 왜곡 필터</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0; /* 배경색은 형님께서 원하시면 언제든 흰색으로 바꿀 수 있습니다! */
        }
        canvas {
            border: 5px solid #333;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transform: scaleX(-1); /* 거울처럼 보이게 좌우 반전 */
        }
        h2 { color: #333; font-family: sans-serif; }
    </style>
</head>
<body>

    <h2>😎 형님표 왕눈이 필터 작동 중 😎</h2>
    
    <video id="input_video" style="display: none;" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // 눈과 입을 확대해서 그리는 함수
        function drawDistortedFeature(centerIdx, scale, landmarks, videoWidth, videoHeight) {
            const pt = landmarks[centerIdx];
            const x = pt.x * videoWidth;
            const y = pt.y * videoHeight;
            
            // 확대할 영역의 크기 (임의 설정)
            const size = 100; 
            const sx = Math.max(0, x - size / 2);
            const sy = Math.max(0, y - size / 2);
            const sWidth = size;
            const sHeight = size;

            // 캔버스에 확대해서 덮어 그리기
            const dx = x - (size * scale) / 2;
            const dy = y - (size * scale) / 2;
            const dWidth = size * scale;
            const dHeight = size * scale;

            canvasCtx.drawImage(videoElement, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight);
        }

        function onResults(results) {
            // 1. 비디오 화면을 캔버스에 꽉 차게 먼저 그립니다.
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 2. 얼굴이 인식되었다면 눈과 입을 왜곡(확대) 시킵니다.
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const w = canvasElement.width;
                const h = canvasElement.height;

                // 왼쪽 눈 (대략적인 중심점 159), 오른쪽 눈 (386), 입 (13) 확대 비율 설정
                const eyeScale = 2.0; // 눈 2배 확대
                const mouthScale = 1.8; // 입 1.8배 확대

                // 원본 영상 위에 확대된 눈과 입을 잘라 붙입니다.
                drawDistortedFeature(159, eyeScale, landmarks, w, h); // 왼쪽 눈
                drawDistortedFeature(386, eyeScale, landmarks, w, h); // 오른쪽 눈
                drawDistortedFeature(13, mouthScale, landmarks, w, h); // 입
            }
        }

        // 미디어파이프 얼굴 인식 모델 설정
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        faceMesh.setOptions({
            maxNumFaces: 1, // 한 명의 얼굴만 인식
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onResults);

        // 웹캠 실행 (해상도 640x480)
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
