<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>형님의 동적 리액션 엽기 필터</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #ffeb3b; }
        canvas { border: 5px solid #000; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transform: scaleX(-1); }
        h2 { color: #000; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; font-weight: bold; font-size: 16px; border: 3px solid #000; border-radius: 8px; background-color: #fff; cursor: pointer; transition: 0.1s; box-shadow: 4px 4px 0px #000; }
        button:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
        button.active { background-color: #000; color: #fff; }
        #instruction { margin-top: 15px; font-size: 18px; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>

    <h2>🤪 형님표 대폭소 필터 🤪</h2>
    
    <div class="controls">
        <button id="pufferFish" class="active">복어 (입 벌려보십쇼!)</button>
        <button id="twoFace">아수라 짝짝이</button>
        <button id="chinToTop">오이 얼굴</button>
    </div>

    <video id="input_video" style="display: none;" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    
    <div id="instruction">👇 화면을 보고 입을 크게 벌려보세요! 👇</div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const instruction = document.getElementById('instruction');
        let currentDistortionType = 'pufferFish';

        const buttons = document.querySelectorAll('.controls button');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                document.querySelector('.controls button.active').classList.remove('active');
                button.classList.add('active');
                currentDistortionType = button.id;
                
                // 안내 문구 변경
                if(button.id === 'pufferFish') instruction.innerText = "👇 입을 쩍 벌려보십쇼! (눈알 튀어나옴) 👇";
                else if(button.id === 'twoFace') instruction.innerText = "👇 윙크를 해보십쇼! 언밸런스의 극치 👇";
                else instruction.innerText = "👇 턱을 위아래로 움직여보십쇼! 👇";
            });
        });

        function applyLensEffect(imageData, centerX, centerY, radius, strength) {
            const width = imageData.width;
            const height = imageData.height;
            const srcData = new Uint8ClampedArray(imageData.data); 
            const dstData = imageData.data; 

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < radius && distance > 0) {
                        const normDist = distance / radius;
                        const srcNormDist = Math.pow(normDist, strength);
                        const srcDistance = srcNormDist * radius;

                        const srcX = Math.round(centerX + (dx / distance) * srcDistance);
                        const srcY = Math.round(centerY + (dy / distance) * srcDistance);

                        if (srcX >= 0 && srcX < width && srcY >= 0 && srcY < height) {
                            const dstIdx = (y * width + x) * 4;
                            const srcIdx = (srcY * width + srcX) * 4;
                            dstData[dstIdx] = srcData[srcIdx];         
                            dstData[dstIdx + 1] = srcData[srcIdx + 1]; 
                            dstData[dstIdx + 2] = srcData[srcIdx + 2]; 
                            dstData[dstIdx + 3] = srcData[srcIdx + 3]; 
                        }
                    }
                }
            }
        }

        function onResults(results) {
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const w = canvasElement.width;
                const h = canvasElement.height;
                const imageData = canvasCtx.getImageData(0, 0, w, h);

                const leftEye = landmarks[159];
                const rightEye = landmarks[386];
                
                // 핵심 기능: 위아래 입술의 거리를 계산하여 '입을 벌린 정도'를 파악합니다.
                const upperLip = landmarks[13];
                const lowerLip = landmarks[14];
                const mouthOpenness = Math.abs(lowerLip.y - upperLip.y) * h; 

                switch (currentDistortionType) {
                    case 'pufferFish':
                        // [복어 모드] 입을 벌릴수록 눈이 비정상적으로 튀어나옵니다!
                        // 입을 다물고 있으면 기본 크기(1.2), 쩍 벌리면 최대 4.0배까지 커짐
                        const popStrength = 1.2 + (mouthOpenness / 10); 
                        const popRadius = 60 + mouthOpenness; // 커질수록 영향받는 반경도 넓어짐
                        
                        applyLensEffect(imageData, leftEye.x * w, leftEye.y * h, popRadius, popStrength);
                        applyLensEffect(imageData, rightEye.x * w, rightEye.y * h, popRadius, popStrength);
                        break;

                    case 'twoFace':
                        // [아수라 모드] 왼쪽은 비정상적으로 크고, 오른쪽은 점처럼 작아집니다.
                        applyLensEffect(imageData, leftEye.x * w, leftEye.y * h, 120, 3.0); // 왕눈이
                        applyLensEffect(imageData, rightEye.x * w, rightEye.y * h, 100, 0.3); // 단추구멍
                        // 입술도 한쪽으로 쏠리게
                        applyLensEffect(imageData, upperLip.x * w - 30, upperLip.y * h, 80, 2.0); 
                        break;

                    case 'chinToTop':
                        // [오이 모드] 턱은 엄청나게 길어지고 눈은 이마 쪽으로 쏠립니다.
                        const chin = landmarks[152];
                        applyLensEffect(imageData, chin.x * w, chin.y * h + 50, 200, 2.5); // 턱 주걱턱화
                        applyLensEffect(imageData, (leftEye.x + rightEye.x)/2 * w, leftEye.y * h - 30, 150, 0.5); // 미간이 빨려들어감
                        break;
                }
                canvasCtx.putImageData(imageData, 0, 0);
            }
        }

        const faceMesh = new FaceMesh({locateFile: (file) => { return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`; }});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, { onFrame: async () => { await faceMesh.send({image: videoElement}); }, width: 640, height: 480 });
        camera.start();
    </script>
</body>
</html>
