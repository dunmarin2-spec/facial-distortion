<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>형님의 AI 사진관</title>
    <style>
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #333; }
        .camera-box { position: relative; width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #000; }
        video, img { width: 100%; display: block; }
        img { display: none; } /* 처음엔 결과 이미지 숨김 */
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; }
        select, button { padding: 15px; font-size: 16px; border-radius: 10px; border: none; font-weight: bold; }
        select { background-color: #fff; border: 2px solid #ddd; outline: none; }
        button { background-color: #4CAF50; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background-color: #45a049; transform: translateY(-2px); }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        #loading { display: none; text-align: center; color: #666; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>✨ 형님의 마법 AI 사진관 ✨</h1>

    <div class="camera-box">
        <video id="camera" autoplay playsinline></video>
        <img id="resultImage" alt="변환된 결과물">
    </div>

    <div class="controls">
        <select id="styleSelect">
            <option value="ghibli">🍃 스튜디오 지브리 스타일</option>
            <option value="webtoon">💬 네이버 K-웹툰 스타일</option>
            <option value="disney">🏰 디즈니 픽사 3D 스타일</option>
        </select>
        
        <button id="captureBtn">📸 찰칵! AI 변환 시작하기</button>
        <button id="retryBtn" style="display:none; background-color:#ff5722;">🔄 다시 찍기</button>
    </div>
    
    <div id="loading">🚀 AI가 형님의 사진을 혼신의 힘을 다해 다시 그리는 중입니다... (약 10~15초 소요)</div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('camera');
        const resultImage = document.getElementById('resultImage');
        const captureBtn = document.getElementById('captureBtn');
        const retryBtn = document.getElementById('retryBtn');
        const styleSelect = document.getElementById('styleSelect');
        const loading = document.getElementById('loading');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 카메라 켜기
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("카메라 권한을 허용해주세요!"));

        captureBtn.addEventListener('click', async () => {
            // 1. 캔버스에 현재 영상 캡처
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            // 2. 이미지를 Base64 문자열로 변환 (서버로 보내기 위함)
            const imageDataUrl = canvas.toDataURL('image/jpeg');
            const selectedStyle = styleSelect.value;

            // 3. UI 변경 (로딩 중)
            video.style.display = 'none';
            resultImage.style.display = 'none';
            loading.style.display = 'block';
            captureBtn.disabled = true;

            try {
                // 4. 버셀 서버(api/transform)로 사진과 스타일 정보 전송!
                const response = await fetch('/api/transform', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageDataUrl, style: selectedStyle })
                });

                const data = await response.json();

                if(response.ok) {
                    // 5. 성공 시 결과 이미지 띄우기
                    resultImage.src = data.outputUrl;
                    resultImage.style.display = 'block';
                    retryBtn.style.display = 'block';
                    captureBtn.style.display = 'none';
                } else {
                    alert("에러가 발생했습니다: " + data.error);
                    video.style.display = 'block';
                }
            } catch (error) {
                alert("서버 통신 실패!");
                video.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                captureBtn.disabled = false;
            }
        });

        // 다시 찍기 버튼
        retryBtn.addEventListener('click', () => {
            resultImage.style.display = 'none';
            video.style.display = 'block';
            retryBtn.style.display = 'none';
            captureBtn.style.display = 'block';
        });
    </script>
</body>
</html>
